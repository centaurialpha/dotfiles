backend = "egl";
vsync = true;
use-damage = true;
unredir-if-possible = true;

detect-rounded-corners = true;
detect-client-opacity = true;

opacity-rule = [
    "90:class_g = 'st' && focused",
    "70:class_g = 'st' && !focused"
];

blur-background = true;
blur-background-frame = true;

blur: {
    method = "dual_kawase";
    size = 6;
    deviation = 1.0;
}

shadow = false;
